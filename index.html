  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, errorInfo: '' };
      }
      static getDerivedStateFromError(error) { return { hasError: true }; }
      componentDidCatch(error, errorInfo) { 
        this.setState({ errorInfo: String(error) }); 
        const loader = document.getElementById('loader');
        if (loader) loader.style.display = 'none';
        const rootNode = document.getElementById('root');
        if (rootNode) rootNode.style.display = 'block';
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-center">
              <div className="bg-slate-800 p-8 rounded-3xl max-w-md w-full border border-slate-700 shadow-2xl animate-pop-in">
                <span className="text-5xl block mb-4">⚠️</span>
                <h2 className="text-xl font-bold text-white mb-2">Error Crítico</h2>
                <div className="bg-slate-950 text-rose-400 p-4 rounded-xl text-left mb-6 font-mono text-xs overflow-auto h-32 border border-slate-800">{this.state.errorInfo}</div>

            </div>

    const hashPassword = async (plainText) => {
      const msgBuffer = new TextEncoder().encode(plainText);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

      const lastPinchZoom = useRef(1);

      // --- DATABASE STATES ---
      const [branding, setBranding] = useState(() => { const l = safeGetLocal('ce_branding'); if(l) try{ return JSON.parse(l); }catch(e){} return { companyName: 'Constructora Alpha', companyFont: "'Cinzel', serif", companyTextColor: '#ffffff', headerBgColor: '#0f172a', companyLogo: null, companyLogo2: null, loginBg: null, favicon: null }; });
      const { companyName, companyFont, companyTextColor, headerBgColor, companyLogo, companyLogo2, loginBg, favicon } = branding || {};
      const [pdfConfig, setPdfConfig] = useState(() => { const l = safeGetLocal('ce_pdf'); if (l) try { return JSON.parse(l); } catch(e){} return { logoWidth: 150, mapWidth: 180, mapHeight: 160, mapObjectFit: 'contain', headerColor: '#1e3a8a', titleSize: 22, customTitle: 'ACTA DE REVISIÓN Y ENTREGAS', headerLayout: 'split', layout: ['header', 'info', 'map', 'table', 'signatures'] }; });
      const [users, setUsers] = useState(() => { const l = safeGetLocal('ce_usr'); if (l) try { const p = JSON.parse(l); if(p?.length>0) return p.filter(Boolean); } catch(e){} return [{ username: 'admin', password: '123', name: 'Administrador Maestro', role: 'admin', cargo: 'Gerente', isRoot: true }]; });
      const [partidasState, setPartidasState] = useState(() => { const l = safeGetLocal('ce_part'); if(l) try{ return JSON.parse(l); }catch(e){} return DEFAULT_PARTIDAS; });

      useEffect(() => { setZoomScale(1); setDeliveryMode(false); setActivePlanLevel(1); }, [selectedApartment]);
      
      useEffect(() => {
        if (!formPartida && Object.keys(partidasState).length > 0) setFormPartida(Object.keys(partidasState)[0]);

        if (p && p.defectos) { setFormDefect(p.defectos.includes(formDefect) ? formDefect : (p.defectos[0] || '')); }
      }, [formPartida, partidasState]);

      const closeLightbox = () => { setLightboxPhoto(null); setLightboxZoom(1); };
      const handleLightboxTouchStart = (e) => { if (e.touches.length === 2) { initialPinchDistance.current = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); lastPinchZoom.current = lightboxZoom; } };
      const handleLightboxTouchMove = (e) => { if (e.touches.length === 2 && initialPinchDistance.current) { const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); setLightboxZoom(Math.max(0.5, Math.min(5, lastPinchZoom.current * (dist / initialPinchDistance.current)))); } };
      const handleLightboxTouchEnd = () => { initialPinchDistance.current = null; };

      const resizeImageAndSave = (file, maxDim, quality, callback, asWebp = false) => {
        if (!file) return; const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas'); let w = img.width, h = img.height;
            if (w > h && w > maxDim) { h *= maxDim / w; w = maxDim; } else if (h > maxDim) { w *= maxDim / h; h = maxDim; }
            canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d');
            let format = asWebp ? 'image/webp' : (file.type === 'image/png' ? 'image/png' : 'image/jpeg');
            if (format === 'image/jpeg') { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h); }
            ctx.drawImage(img, 0, 0, w, h); callback(canvas.toDataURL(format, quality));
          }; img.src = e.target.result;

                .then(function(pdf) { return pdf.getPage(1); })
                .then(function(page) {
                  const viewport = page.getViewport({scale: 2.0}); 
                  const canvas = document.createElement('canvas');
                  canvas.width = viewport.width; canvas.height = viewport.height;
                  const ctx = canvas.getContext('2d');
                  return page.render({canvasContext: ctx, viewport: viewport}).promise.then(function() {
                    const max_dim = 1600; 
                    let w = canvas.width, h = canvas.height;
                    if (w > h && w > max_dim) { h *= max_dim / w; w = max_dim; } else if (h > max_dim) { w *= max_dim / h; h = max_dim; }
                    const finalCanvas = document.createElement('canvas');

                    const finalCtx = finalCanvas.getContext('2d');
                    
                    finalCtx.fillStyle = '#ffffff';

      const startMarkupDrawing = (e) => {

      const drawMarkup = (e) => {
        if (!isMarkupDrawing.current || !markupCanvasRef.current) return;
        const ctx = markupCanvasRef.current.getContext('2d');
        const rect = markupCanvasRef.current.getBoundingClientRect();
        
        let clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        let clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
        
        const scaleX = markupCanvasRef.current.width / rect.width;
        const scaleY = markupCanvasRef.current.height / rect.height;
        
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;
        
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#ef4444';
        
        if (e.type === 'mousedown' || e.type === 'touchstart') {
          ctx.beginPath();
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
          ctx.stroke();
        }
      };
      
      const stopMarkupDrawing = () => {

        if (phase === 'r2') newSigs.r2Closed = status;
        if (phase === 'final') newSigs.finalClosed = status;

        setSignaturesData(prev => {
          const filtered = prev.filter(s => s.id !== currentSigId);
          return [...filtered, newSigs];
        });

        if (isCloud()) {
          window.firebase.firestore().collection('signatures_v2').doc(currentSigId).set(newSigs).catch(e => console.error(e));
        }
        showToast(status ? `Fase cerrada.` : `Fase reabierta.`);
      };

      const saveSignature = () => {
        if (canvasRef.current && currentSigId) {
          const dataUrl = canvasRef.current.toDataURL('image/png');
          const newSigs = { ...currentSigs, id: currentSigId };
          
          const userObj = safeUsers.find(u => u.username === modalSignUser);
          if (!userObj) { showToast('Seleccione un usuario de la lista', 'error'); return; }

          const newSigObj = {
              id: Date.now().toString(),
              name: userObj.name,
              role: userObj.cargo || (userObj.role === 'admin' ? 'Administrador' : 'Revisor'),
              date: new Date().toLocaleDateString('es-ES'),
              image: dataUrl
          };

          if (!newSigs.r1Sigs) newSigs.r1Sigs = [];
          if (!newSigs.r2Sigs) newSigs.r2Sigs = [];
          if (!newSigs.finalSigs) newSigs.finalSigs = [];

          if (currentSignPhase === 'r1') newSigs.r1Sigs.push(newSigObj);
          else if (currentSignPhase === 'r2') newSigs.r2Sigs.push(newSigObj);
          else newSigs.finalSigs.push(newSigObj);

          setSignaturesData(prev => {
            const filtered = prev.filter(s => s.id !== currentSigId);
            return [...filtered, newSigs];
          });

          if (isCloud()) {
            window.firebase.firestore().collection('signatures_v2').doc(currentSigId).set(newSigs).catch(err => { console.error(err); });
          }

          setShowSignModal(false);
          showToast('Firma registrada con éxito.');
        }

           const newSigs = { ...currentSigs };
           if (phase === 'r1') newSigs.r1Sigs = (newSigs.r1Sigs || []).filter(s => s.id !== sigId);
           if (phase === 'r2') newSigs.r2Sigs = (newSigs.r2Sigs || []).filter(s => s.id !== sigId);
           if (phase === 'final') newSigs.finalSigs = (newSigs.finalSigs || []).filter(s => s.id !== sigId);
           
           setSignaturesData(prev => prev.map(s => s.id === currentSigId ? newSigs : s));

           if (isCloud()) {
              window.firebase.firestore().collection('signatures_v2').doc(currentSigId).set(newSigs).catch(e => { console.error(e); });
           }
        });
      };

      const startDrawing = (e) => { isDrawing.current = true; draw(e); };
      const draw = (e) => {
        if (!isDrawing.current || !canvasRef.current) return;
        const ctx = canvasRef.current.getContext('2d');
        const rect = canvasRef.current.getBoundingClientRect();
        let clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        let clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
        const x = ((clientX - rect.left) / rect.width) * canvasRef.current.width;
        const y = ((clientY - rect.top) / rect.height) * canvasRef.current.height;
        ctx.lineWidth = 1.5; 
        ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';
        if (e.type === 'mousedown' || e.type === 'touchstart') { ctx.beginPath(); ctx.moveTo(x, y); } else { ctx.lineTo(x, y); ctx.stroke(); }
      };

      const clearCanvas = () => {

                    const sigId = `${activeProject.id}_${selectedFloor}_${dpto.number}`;
                    const sig = signaturesData.find(s => s.id === sigId);
                    
                    const isEntregado = sig?.finalClosed;
                    const isR2 = sig?.r1Closed && !sig?.finalClosed;
                    const isR1 = !sig?.r1Closed;

                    const dptoObs = safeObservations.filter(o => o.projectId === activeProject.id && o.floor === selectedFloor && o.apartment === dpto.number);
                    const totalCount = dptoObs.length;
                    const globalPendingCount = dptoObs.filter(o => o.status !== 'levantada').length;
                    
                    const contractorPendingCount = dptoObs.filter(o => 
                      o.status !== 'levantada' && 
                      (currentUser?.assignedPartidas?.length > 0 ? currentUser.assignedPartidas.includes(o.partida) : o.subcontractor === currentUser?.subcontractor)
                    ).length;
                    
                    const toVerifyCount = dptoObs.filter(o => o.status === 'por_verificar').length;

 let targetDateStr = null; let phaseName = '';
                if (!isEntregado) { if (isR1) { targetDateStr = dpto.dateR1; phaseName = 'R1'; } else if (isR2) { targetDateStr = dpto.dateR2; phaseName = 'R2'; } else { targetDateStr = dpto.dateFinal; phaseName = 'Entrega'; } }

                let urgencyStatus = 'none'; let urgencyMsg = 'Sin fecha límite';

                if (isEntregado) {
                  urgencyStatus = 'ok';
                  urgencyMsg = 'Sellado';
                } else if (targetDateStr) {
                  const parts = targetDateStr.split(/[-/]/);
                  if (parts.length === 3) {
                    const day = parseInt(parts[0], 10);
                    const month = parseInt(parts[1], 10) - 1; 
                    let year = parseInt(parts[2], 10);
                    if (year < 100) year += 2000; 

                    // CORRECCIÓN: Normalizamos ambas fechas a las 00:00:00 para comparar días puros sin desfases horarios
                    const targetDate = new Date(year, month, day, 0, 0, 0, 0);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    
                    if (!isNaN(targetDate.getTime())) {
                      const diffTime = targetDate.getTime() - today.getTime();
                      // Math.round es más seguro aquí que Math.ceil tras normalizar a la medianoche
                      const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                      
                      if (diffDays < 0) { 
                        urgencyStatus = 'overdue'; 
                        urgencyMsg = `Atrasado! ${phaseName} (${targetDateStr})`; 
                      } else if (diffDays === 0) { 
                        urgencyStatus = 'urgent'; 
                        urgencyMsg = `¡${phaseName} HOY!`; 
                      } else if (diffDays <= 3) { 
                        urgencyStatus = 'urgent'; 
                        urgencyMsg = `Próximo! ${phaseName} en ${diffDays}d`; 
                      } else { 
                        urgencyStatus = 'normal'; 
                        urgencyMsg = `${phaseName}: ${targetDateStr}`; 
                      }
                    } else {
                      urgencyMsg = `Fecha inválida`;
                    }
                  } else {
                    urgencyMsg = `Fecha inválida`;
                  }
                }

                    let cardStyle = "bg-white border-slate-200 hover-lift";
                    if (isR1 && totalCount === 0) cardStyle = "bg-slate-50 border-slate-200 opacity-80 hover:opacity-100 hover-lift";
                    if (isEntregado) cardStyle = "bg-emerald-50/50 border-emerald-300 shadow-emerald-500/5 hover-lift";

                            {role === 'contratista' && contractorPendingCount > 0 && !isEntregado && (
                              <span className="text-[8px] sm:text-[9px] bg-rose-100 text-rose-700 font-bold px-2 py-0.5 rounded shadow-sm border border-rose-200">🔴 {contractorPendingCount} Tareas</span>
                            )}
                          </div>
                        </div>
                        <div className="flex-1">
                          <h3 className={`font-bold text-lg sm:text-xl ${isEntregado ? 'text-emerald-900' : 'text-slate-800 group-hover:text-indigo-700 transition-colors'}`}>Dpto. {String(dpto.number || '')}</h3>
                          <p className={`text-[9px] sm:text-[10px] mt-1 font-medium ${isEntregado ? 'text-emerald-700' : 'text-slate-500'}`}>{isR1 && totalCount === 0 ? "Aún no ha sido auditado" : (isEntregado ? "Cerrado y Conforme" : `Tiene ${totalCount} observaciones`)}</p>

                        <div className="pt-2 border-t border-slate-200 mt-auto flex items-center justify-between">

                            {urgencyStatus === 'overdue' && '🚨 '}
                            {urgencyStatus === 'urgent' && '⚠️ '}
                            {urgencyStatus === 'ok' && '🏆 '}
                            {urgencyMsg}

                          <div key={i} className={`flex justify-between items-start text-sm p-4 border-b border-slate-100 hover:bg-slate-50 transition-colors group rounded-xl ${isBeingEdited ? 'bg-indigo-50/50 border-l-4 border-l-indigo-500' : ''}`}>
                            <div className="flex items-start gap-3">
                               <div className="text-2xl pt-1 opacity-80">{roleIcon}</div>
                               <div>
                                 <strong className={`text-base block mb-0.5 ${isBeingEdited ? 'text-indigo-800' : 'text-slate-800'}`}>
                                    {String(u.name)}
                                    {isMaster && <span className="text-[9px] bg-rose-100 text-rose-700 ml-2 px-2 py-0.5 rounded-full border border-rose-200 align-middle shadow-sm font-black tracking-widest uppercase">Maestro 🛡️</span>}
                                 </strong>
                                 <p className="text-xs text-slate-500 font-mono bg-slate-100 px-2 py-0.5 rounded border border-slate-200 inline-block mb-2 shadow-sm">@{String(u.username)}</p>
                                 <div className="flex flex-col gap-1">
                                   <span className={`text-[9px] font-bold uppercase px-2 py-0.5 rounded border inline-block w-max shadow-sm ${roleBadge}`}>
                                     Perfil: {String(u.role)}
                                   </span>
                                   {u.cargo && <span className="text-[10px] text-slate-500 font-medium italic block mt-0.5">Cargo Formal: {u.cargo}</span>}
                                   {u.role === 'contratista' && <span className="text-[10px] bg-slate-800 text-white px-2 py-1 rounded-md mt-1 inline-block shadow-sm">🏢 Especialidades: {(u.assignedPartidas || []).join(', ')}</span>}
                                 </div>
                               </div>
                            </div>
                            <div className="flex flex-col gap-2 shrink-0 ml-3">
                              {(!isMaster || (currentUser && currentUser.isRoot)) && (
                                <button 
                                  className="text-indigo-600 font-bold bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 opacity-50 group-hover:opacity-100 transition-all hover:bg-indigo-600 hover:text-white active:scale-95 text-[11px] shadow-sm flex items-center justify-center gap-1.5" 
                                  onClick={()=>handleEditarUsuario(u.username)}
                                >
                                  <span>✏️</span> Editar
                                </button>
                              )}
                              {!isMaster && (
                                <button 
                                  className="text-rose-500 font-bold bg-rose-50 px-3 py-1.5 rounded-lg border border-rose-100 opacity-50 group-hover:opacity-100 transition-all hover:bg-rose-500 hover:text-white active:scale-95 text-[11px] shadow-sm flex items-center justify-center gap-1.5" 
                                  onClick={()=>handleEliminarUsuario(u.username)}
                                >
                                  <span>✕</span> Revocar
                                </button>
                              )}
                            </div>
                          </div> 
                         );
                      })}
                    </div>
                  </div>
                )}
                
                {ajustesTab === 'marca' && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-slide-up">
                    <div className="bg-slate-50 p-8 rounded-2xl border border-slate-200 flex flex-col gap-6 shadow-inner">
                      <div>
                         <h4 className="font-bold text-base text-slate-800 border-b border-slate-200 pb-3 mb-4 flex items-center gap-2"><span>🎨</span> Personalización de Identidad Corporativa</h4>
                         
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2 mt-4">Nombre Formal de Empresa / Administradora</label>
                         <input className="w-full text-base p-3.5 border border-slate-300 rounded-xl bg-white font-bold text-slate-800 shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all mb-4" style={{ fontFamily: companyFont }} placeholder="Constructora Alpha S.A." value={companyName} onChange={e=>updateBrandingDataCloud(e.target.value, undefined, undefined, undefined, undefined, undefined, undefined, undefined)}/>
                         
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Tipografía Corporativa (Nombre de Empresa)</label>
                         <select 
                           className="w-full text-sm p-3.5 border border-slate-300 rounded-xl bg-white shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold text-slate-700 cursor-pointer appearance-none mb-4" 
                           value={companyFont} 
                           onChange={e => updateBrandingDataCloud(undefined, undefined, undefined, undefined, e.target.value, undefined, undefined, undefined)}
                         >
                           <option value="'Cinzel', serif" style={{fontFamily: "'Cinzel', serif"}}>Cinzel (Elegante / Clásica)</option>
                           <option value="'Playfair Display', serif" style={{fontFamily: "'Playfair Display', serif"}}>Playfair Display (Moderna / Serif)</option>
                           <option value="'Montserrat', sans-serif" style={{fontFamily: "'Montserrat', sans-serif"}}>Montserrat (Geométrica / Limpia)</option>
                           <option value="'Inter', sans-serif" style={{fontFamily: "'Inter', sans-serif"}}>Inter (Tecnológica / Neutral)</option>
                           <option value="'Oswald', sans-serif" style={{fontFamily: "'Oswald', sans-serif"}}>Oswald (Condensada / Impactante)</option>
                           <option value="'Lora', serif" style={{fontFamily: "'Lora', serif"}}>Lora (Académica / Sofisticada)</option>
                         </select>

                         <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                           <div>
                             <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Color del Texto de la Marca</label>
                             <div className="flex gap-2">
                               <input type="color" className="h-10 w-14 rounded-lg cursor-pointer border shadow-sm" value={companyTextColor} onChange={e => updateBrandingDataCloud(undefined, undefined, undefined, undefined, undefined, undefined, undefined, e.target.value)} />
                               <input type="text" className="flex-1 text-sm p-2.5 border border-slate-300 rounded-xl bg-white shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-mono text-slate-700 uppercase" value={companyTextColor} onChange={e => updateBrandingDataCloud(undefined, undefined, undefined, undefined, undefined, undefined, undefined, e.target.value)} />
                             </div>
                           </div>
                           <div>
                             <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Color de Barra Superior (App)</label>
                             <div className="flex gap-2">
                               <input type="color" className="h-10 w-14 rounded-lg cursor-pointer border shadow-sm" value={headerBgColor.substring(0,7)} onChange={e => updateBrandingDataCloud(undefined, undefined, undefined, undefined, undefined, e.target.value, undefined, undefined)} />
                               <input type="text" className="flex-1 text-sm p-2.5 border border-slate-300 rounded-xl bg-white shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-mono text-slate-700 uppercase" value={headerBgColor.substring(0,7)} onChange={e => updateBrandingDataCloud(undefined, undefined, undefined, undefined, undefined, e.target.value, undefined, undefined)} />
                             </div>
                           </div>
                         </div>
                      </div>

                      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 pt-2 border-t border-slate-200 mt-2">
                        <div>
                          <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Logotipo Principal (Izquierda en Reportes)</label>
                          <input type="file" accept="image/*" id="bl" className="hidden" onChange={handleCompanyLogo}/>
                          <div className="flex flex-col items-center gap-3">
                            <div className="h-24 w-full flex items-center justify-center p-2 drop-shadow-sm bg-white rounded-xl border border-slate-300 shadow-sm">
                               {companyLogo ? <img src={companyLogo} className="max-h-full max-w-full object-contain" /> : <span className="text-[10px] text-slate-400 font-medium">Ninguno</span>}
                            </div>
                            <label htmlFor="bl" className="w-full bg-indigo-50 text-indigo-700 border border-indigo-200 text-center text-[10px] py-2 cursor-pointer rounded-lg font-bold hover:bg-indigo-600 hover:text-white transition-all shadow-sm active:scale-95 uppercase tracking-wide">Cargar PNG/JPG</label>
                          </div>
                        </div>

                        <div>
                          <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Logotipo Secundario (Derecha / Supervisión)</label>
                          <input type="file" accept="image/*" id="bl2" className="hidden" onChange={handleCompanyLogo2}/>
                          <div className="flex flex-col items-center gap-3">
                            <div className="h-24 w-full flex items-center justify-center p-2 drop-shadow-sm bg-white rounded-xl border border-slate-300 shadow-sm">
                               {companyLogo2 ? <img src={companyLogo2} className="max-h-full max-w-full object-contain" /> : <span className="text-[10px] text-slate-400 font-medium">Ninguno</span>}
                            </div>
                            <label htmlFor="bl2" className="w-full bg-indigo-50 text-indigo-700 border border-indigo-200 text-center text-[10px] py-2 cursor-pointer rounded-lg font-bold hover:bg-indigo-600 hover:text-white transition-all shadow-sm active:scale-95 uppercase tracking-wide">Cargar PNG/JPG</label>
                          </div>
                        </div>

                        <div>
                          <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Ícono de Web (Favicon en Pestaña)</label>
                          <input type="file" accept="image/*" id="bl3" className="hidden" onChange={handleFaviconUpload}/>
                          <div className="flex flex-col items-center gap-3">
                            <div className="h-24 w-full flex items-center justify-center p-2 drop-shadow-sm bg-white rounded-xl border border-slate-300 shadow-sm">
                               {favicon ? <img src={favicon} className="max-h-full max-w-full object-contain" /> : <span className="text-[10px] text-slate-400 font-medium text-center leading-tight">Sube un<br/>PNG/JPG</span>}
                            </div>
                            <label htmlFor="bl3" className="w-full bg-indigo-50 text-indigo-700 border border-indigo-200 text-center text-[10px] py-2 cursor-pointer rounded-lg font-bold hover:bg-indigo-600 hover:text-white transition-all shadow-sm active:scale-95 uppercase tracking-wide">Cargar Ícono</label>
                          </div>
                        </div>
                      </div>

                      <div className="pt-6 border-t border-slate-200 mt-2">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-3 flex items-center gap-2"><span>🖼️</span> Fondo inmersivo para la Pantalla de Inicio (Login)</label>
                        <input type="file" accept="image/*" id="blBg" className="hidden" onChange={handleLoginBgUpload}/>
                        <div className="flex items-center gap-4 bg-white p-4 rounded-xl border border-slate-300 shadow-sm">
                          {loginBg ? ( <div className="h-16 w-24 rounded-lg overflow-hidden border border-slate-200 shadow-sm"><img src={loginBg} className="h-full w-full object-cover" /></div> ) : ( <div className="h-16 w-24 rounded-lg bg-slate-100 border border-dashed border-slate-300 flex items-center justify-center"><span className="text-xl opacity-30">🖼️</span></div> )}
                          <div className="flex flex-col flex-1 gap-2">
                             <span className="text-[10px] text-slate-500 font-medium leading-tight">Recomendado: Imagen horizontal de alta calidad (1920x1080) del render o foto de la obra principal.</span>
                             <label htmlFor="blBg" className="bg-slate-800 text-white text-center text-[10px] py-2 px-4 cursor-pointer rounded-lg font-bold hover:bg-slate-700 transition-all shadow-md active:scale-95 uppercase tracking-wide w-max">Modificar Tapiz de Fondo</label>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* MODALES ADICIONALES */}
          {showSignModal && (
            <div className="fixed inset-0 bg-slate-900/70 flex items-center justify-center p-4 z-50 backdrop-blur-md animate-fade-in" onClick={() => setShowSignModal(false)}>
              <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl border border-slate-100 animate-pop-in" onClick={e => e.stopPropagation()}>
                <div className="bg-slate-900 text-white p-6 flex justify-between items-center border-b border-slate-800">
                  <h3 className="font-bold text-lg flex items-center gap-2"><span>✍️</span> Validación y Firma Digital</h3>
                  <button className="text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 w-8 h-8 rounded-lg flex items-center justify-center font-bold transition-colors" onClick={() => setShowSignModal(false)}>✕</button>
                </div>
                <div className="p-7 flex flex-col gap-6 items-center bg-slate-50/50">
                  
                  <div className="w-full">
                    <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1.5 tracking-wider">Identidad Legal (Seleccione de la lista maestra):</label>
                    <div className="relative">
                      <select 
                        className="w-full text-sm p-3.5 border border-slate-300 rounded-xl bg-white shadow-sm font-semibold text-slate-800 appearance-none outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer" 
                        value={modalSignUser} 
                        onChange={e => setModalSignUser(e.target.value)}
                      >
                        <option value="" disabled className="text-slate-400 font-normal">Pulse aquí para desplegar la lista corporativa...</option>
                        {safeUsers.filter(u => u.role === 'admin' || u.role === 'revisor').map(u => (
                          <option key={u.username} value={u.username}>
                            {u.name} — {u.cargo || (u.role === 'admin' ? 'Administrador General' : 'Ingeniero Revisor')}
                          </option>
                        ))}
                      </select>
                      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">▼</div>
                    </div>
                  </div>

                  <div className="w-full bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
                     <div className="flex justify-between items-end mb-2">
                       <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Lienzo de Firma Táctil</span>
                       <span className="text-[8px] text-slate-300 italic mr-1">Dibuje dentro del recuadro</span>
                     </div>
                     <div className="rounded-xl overflow-hidden border border-slate-300 bg-slate-50/50 relative">
                       <canvas ref={canvasRef} width={340} height={160} className="w-full h-full cursor-crosshair touch-none opacity-80 mix-blend-multiply" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                       <div className="absolute bottom-4 left-4 right-4 border-b border-dashed border-slate-300 pointer-events-none opacity-50"></div>
                     </div>
                  </div>

                  <div className="flex gap-3 w-full mt-1">
                    <button className="flex-1 bg-white hover:bg-slate-100 text-slate-600 border border-slate-300 py-3.5 text-xs font-bold rounded-xl transition-all shadow-sm active:scale-95" onClick={clearCanvas}>Borrar Trazo</button>
                    <button className="flex-1 btn-primary py-3.5 text-xs font-bold rounded-xl transition-all active:scale-95" onClick={saveSignature}>Incrustar Firma</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* --- MODAL DE ANOTACIONES EN FOTO (MARKUP) --- */}
          {markupPhoto && (
            <div className="fixed inset-0 bg-slate-950/95 flex flex-col items-center justify-center p-4 z-[99999] backdrop-blur-md animate-fade-in" onClick={() => setMarkupPhoto(null)}>
              <div className="flex justify-between items-center w-full max-w-3xl mb-4 text-white" onClick={e => e.stopPropagation()}>
                <div>
                  <h3 className="font-bold text-xl flex items-center gap-2">🖍️ Anotación de Evidencia</h3>
                  <p className="text-xs text-slate-300 mt-1">Dibuje con el dedo sobre la foto para resaltar el defecto exacto al contratista.</p>
                </div>
                <button className="text-slate-400 hover:text-white font-bold bg-slate-800 w-10 h-10 rounded-full flex items-center justify-center hover:bg-rose-600 transition-all" onClick={() => setMarkupPhoto(null)}>✕</button>
              </div>
              
              <div className="relative max-w-3xl w-full bg-slate-900 rounded-2xl overflow-hidden shadow-2xl flex items-center justify-center border border-slate-700" style={{ maxHeight: '65vh' }} onClick={e => e.stopPropagation()}>
                <canvas 
                  ref={markupCanvasRef}
                  className="max-w-full max-h-full object-contain cursor-crosshair touch-none"
                  onMouseDown={startMarkupDrawing}
                  onMouseMove={drawMarkup}
                  onMouseUp={stopMarkupDrawing}
                  onMouseLeave={stopMarkupDrawing}
                  onTouchStart={startMarkupDrawing}
                  onTouchMove={drawMarkup}
                  onTouchEnd={stopMarkupDrawing}
                />
              </div>

              <div className="flex flex-col sm:flex-row gap-3 w-full max-w-3xl mt-6" onClick={e => e.stopPropagation()}>
                <button className="w-full sm:w-auto bg-slate-800 hover:bg-slate-700 text-white font-bold py-3.5 px-6 rounded-xl text-sm transition-all" onClick={clearMarkup}>↺ Limpiar Trazos</button>
                <button className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl text-sm transition-all shadow-lg shadow-emerald-600/30" onClick={saveMarkup}>💾 Guardar Foto Anotada</button>
              </div>
            </div>
          )}

          {/* --- MODAL VISOR DE FOTOS (LIGHTBOX CON ZOOM) --- */}
          {lightboxPhoto && (
            <div className="fixed inset-0 bg-slate-950/95 z-[99999] flex flex-col items-center justify-center backdrop-blur-md animate-fade-in" onClick={closeLightbox}>
              <div className="absolute top-4 right-4 sm:top-6 sm:right-6 flex gap-3 z-50">
                <div className="bg-slate-800/80 backdrop-blur rounded-xl p-1.5 flex gap-1 border border-slate-700 shadow-xl" onClick={e => e.stopPropagation()}>
                  <button className="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center text-white hover:bg-slate-700 rounded-lg transition-colors text-xl font-bold active:scale-95" onClick={() => setLightboxZoom(z => Math.max(0.5, z - 0.5))}>➖</button>
                  <button className="w-12 h-10 sm:w-16 sm:h-12 flex items-center justify-center text-slate-300 font-bold text-xs sm:text-sm hover:text-white transition-colors" onClick={() => setLightboxZoom(1)}>{Math.round(lightboxZoom * 100)}%</button>
                  <button className="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center text-white hover:bg-slate-700 rounded-lg transition-colors text-xl font-bold active:scale-95" onClick={() => setLightboxZoom(z => Math.min(5, z + 0.5))}>➕</button>
                </div>
                <button className="w-12 h-12 sm:w-14 sm:h-14 bg-rose-600 hover:bg-rose-500 text-white rounded-xl flex items-center justify-center font-bold text-xl sm:text-2xl shadow-lg shadow-rose-900/50 transition-all active:scale-95 border border-rose-400/30" onClick={closeLightbox}>✕</button>
              </div>
              
              <div 
                className="w-full h-full flex items-center justify-center overflow-auto p-4 hide-scrollbar relative" 
                onClick={closeLightbox}
                onTouchStart={handleLightboxTouchStart}
                onTouchMove={handleLightboxTouchMove}
                onTouchEnd={handleLightboxTouchEnd}
                style={{ touchAction: 'none' }}
              >
                <div className="relative inline-block transition-transform duration-75 ease-out origin-center" style={{ transform: `scale(${lightboxZoom})` }} onClick={e => e.stopPropagation()}>
                  {typeof lightboxPhoto === 'object' && lightboxPhoto.apt && (
                    <div className={`absolute top-0 left-0 right-0 bg-slate-900/80 ${lightboxPhoto.res ? 'text-emerald-400' : 'text-sky-400'} text-xs sm:text-sm font-bold px-4 py-2.5 z-10 flex justify-between rounded-t-lg shadow-md`}>
                      <span>DPTO {lightboxPhoto.apt}</span>
                      <span>OBS #{lightboxPhoto.obsNum} {lightboxPhoto.res ? '(RESUELTA)' : ''}</span>
                    </div>
                  )}
                  <img 
                    src={typeof lightboxPhoto === 'object' ? lightboxPhoto.url : lightboxPhoto} 
                    className="max-w-[90vw] max-h-[90vh] object-contain shadow-2xl rounded-lg cursor-default block" 
                    alt="Evidencia"
                  />
                </div>
              </div>
            </div>
          )}

          {/* --- MODAL DE CONFIRMACIÓN DE ACCIONES (ELIMINAR) --- */}
          {confirmModal.show && (
            <div className="fixed inset-0 bg-slate-900/60 z-[999999] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl animate-pop-in border border-slate-100 flex flex-col items-center text-center">
                <div className="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center text-3xl mb-4 shadow-inner">
                  ⚠️
                </div>
                <h3 className="font-bold text-lg text-slate-800 mb-2">Confirmar Acción</h3>
                <p className="text-sm text-slate-500 mb-6">{confirmModal.message}</p>
                <div className="flex gap-3 w-full">
                  <button 
                    className="flex-1 bg-white border border-slate-300 text-slate-700 py-3 rounded-xl font-bold hover:bg-slate-50 transition-all active:scale-95 shadow-sm" 
                    onClick={() => setConfirmModal({ show: false, message: '', onConfirm: null })}
                  >
                    Cancelar
                  </button>
                  <button 
                    className="flex-1 bg-rose-600 hover:bg-rose-500 text-white py-3 rounded-xl font-bold transition-all shadow-md shadow-rose-600/20 active:scale-95" 
                    onClick={() => { if (confirmModal.onConfirm) confirmModal.onConfirm(); setConfirmModal({ show: false, message: '', onConfirm: null }); }}
                  >
                    Confirmar
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<ErrorBoundary><MainApp /></ErrorBoundary>);
    } catch(err) {
      document.getElementById('loader').style.display = 'none';
      var errDiv = document.createElement('div');
      errDiv.innerHTML = '<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; align-items:center; justify-content:center; padding:20px; z-index:9999;"><div style="background:white; padding:40px; border-radius:24px; max-width:500px; text-align:center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);"><h2 style="color:#ef4444; font-weight:bold; margin-bottom:15px; font-size: 28px;">⚠️ Sistema Detenido</h2><p style="margin-bottom:25px; color:#64748b; font-size:14px;">El motor principal fue bloqueado por su navegador. Restaure la configuración de fábrica para continuar.</p><button onclick="localStorage.clear(); window.location.reload();" style="padding:14px 28px; background:linear-gradient(to right, #ef4444, #dc2626); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; width:100%; box-shadow: 0 10px 15px -3px rgba(239,68,68,0.3);">Restaurar Entorno Seguro</button></div></div>';
      document.body.appendChild(errDiv);
    }
  </script>
</body>
</html>
