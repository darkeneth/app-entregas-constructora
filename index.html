<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Control de Entregas - Constructora</title>
  <!-- 🚨 ENLACES OFICIALES -->
  <link rel="manifest" href="./manifest.json?v=final">
  <link rel="icon" type="image/png" href="./icono-final.png?v=final">
  <link rel="apple-touch-icon" href="./icono-final.png?v=final">

  <script>
    document.addEventListener('contextmenu', event => event.preventDefault());
  </script>
  <!-- REGISTRO DEL SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }

  </script>
  <!-- LIBRERÍAS ESENCIALES (TAILWIND, FIREBASE, PDF, FUENTES) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Montserrat:wght@400;600;700&family=Oswald:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    }

  </script>
  <!-- ESCUDO ANTI-CURIOSOS -->
  <script>
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
      if(e.keyCode == 123) { return false; }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
      if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
    }
  </script>
  <script type="module" crossorigin src="./assets/index-_MQoNGPX.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CsZatbmU.css">
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-200 selection:text-indigo-900">

  <!-- PANTALLA DE CARGA -->
  <div id="loader" class="min-h-screen bg-slate-50 flex items-center justify-center z-50 fixed inset-0 transition-opacity duration-500">
    <svg class="w-10 h-10 text-slate-500 animate-spin" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation-timing-function: steps(12, end); animation-duration: 1s;">
      <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="3" x2="12" y2="6" opacity="1"/> <line x1="16.5" y1="4.2" x2="15" y2="6.8" opacity="0.1"/> <line x1="19.8" y1="7.5" x2="17.2" y2="9" opacity="0.1"/> <line x1="21" y1="12" x2="18" y2="12" opacity="0.1"/> <line x1="19.8" y1="16.5" x2="17.2" y2="15" opacity="0.1"/> <line x1="16.5" y1="19.8" x2="15" y2="17.2" opacity="0.1"/> <line x1="12" y1="21" x2="12" y2="18" opacity="0.1"/> <line x1="7.5" y1="19.8" x2="9" y2="17.2" opacity="0.1"/> <line x1="4.2" y1="16.5" x2="6.8" y2="15" opacity="0.2"/> <line x1="3" y1="12" x2="6" y2="12" opacity="0.4"/> <line x1="4.2" y1="7.5" x2="6.8" y2="9" opacity="0.6"/> <line x1="7.5" y1="4.2" x2="9" y2="6.8" opacity="0.8"/>
      </g>
    </svg>
  </div>
  <div id="root" style="display: none;"></div>
  <script>

    setTimeout(function() {

      var root = document.getElementById('root');
      if (root && root.innerHTML.indexOf('animate-spin') !== -1) {
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background-color:#0f172a;padding:20px;text-align:center;"><div style="background:white;padding:40px;border-radius:24px;max-width:500px;text-align:center;box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);"><span style="font-size:40px;display:block;margin-bottom:15px;">⚠️</span><h2 style="color:#1e293b;font-weight:bold;font-size:24px;margin-bottom:10px;">Problema de Conexión</h2><p style="color:#64748b;margin-bottom:25px;">El navegador bloqueó la conexión por seguridad o falta de red.</p><button onclick="localStorage.clear(); window.location.reload();" style="background:linear-gradient(to right, #ef4444, #dc2626);color:white;padding:14px 28px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;width:100%;transition:all 0.2s;">Restablecer Sistema</button></div></div>';
      }

    }, 12000);

  </script>
  <!-- EL CÓDIGO DE VITE (Esta línea hace la magia de compilación) -->
</body>
</html>
